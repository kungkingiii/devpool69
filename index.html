<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Me</title>

  <style>
    * {
      box-sizing: border-box;
    }

    .rotate-warning {
      display: none;
    }

    @media screen and (orientation: portrait) {

      .game {
        display: none;
      }

      .rotate-warning {
        display: flex;
        position: fixed;
        inset: 0;

        justify-content: center;
        align-items: center;

        background: #000;
        color: white;

        font-size: 24px;
        text-align: center;
        padding: 20px;
      }
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      overflow: hidden;
      background: #000;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .character {
      position: absolute;
      left: 55%;
      bottom: 0%;
      width: 47%;

      transform: translateX(-50%);
      cursor: pointer;
      transition: 0.2s;
      z-index: 2;
    }

    .character:hover {
      transform: translateX(-50%) scale(1.05);
    }


    .object {
      position: absolute;
      cursor: pointer;
      transition: 0.2s;
      z-index: 3;
    }

    .object:hover {
      transform: scale(1.05);
    }


    .computer {
      left: 76%;
      top: 23%;
      width: 18%;
    }


    .thaiskill {
      left: 15%;
      top: 4%;
      width: 25%;
    }


    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);

      justify-content: center;
      align-items: center;
      z-index: 999;
    }


    .modal {
      background: rgb(160, 151, 145);
      width: min(500px, 90vw);
      max-height: 80vh;
      overflow-y: auto;

      padding: 30px;
      border-radius: 20px;
      text-align: center;
    }

    .modal h2 {
      margin-top: 0;
    }

    .modal p {
      white-space: pre-line;
      text-align: left;
      line-height: 1.6;
    }

    .modal button {
      margin-top: 20px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="rotate-warning">
    📱↻<br>
    กรุณาหมุนมือถือเป็นแนวนอน
  </div>

  <div class="game">
    <img src="background.png" class="background">
    <img src="character.png" class="character" onclick="openModal('aboutMe')">
    <img src="COMPUTER.png" class="object computer" onclick="openModal('devPool')">
    <img src="thaiskill.png" class="object thaiskill" onclick="openModal('thaiSkill')">

  </div>

  <div id="modalBg" class="modal-bg">
    <div class="modal">

      <h2 id="modalTitle"></h2>

      <p id="modalText"></p>

      <button onclick="closeModal()">
        ปิด
      </button>

    </div>
  </div>

</body>

<script>

  const data = {
    devPool: {
      text: `
อยากเข้า DevPool เพราะ น่าสนุกดี ไม่ได้ code นานแล้ว จะได้รื้อฟื้นความรู้เก่าๆและได้เรียนรู้ skill ใหม่ๆด้วย ตอนนี้ยังมีเรื่องที่ไม่รู้เกี่ยวกับ programing อีกเยอะ เป็นโอกาสดีที่ได้เรียนรู้อะไรใหม่ๆเพิ่ม
  `,
      title: "ทำไมถึงอยากเข้า DevPool"

    },
    thaiSkill: {
      text: `
สังกัด: สชก.(บก-ท)
ตำแหน่ง: content delivery
รายละเอียดงาน:อยู่หน่วยธุรกิจ Thaiskill มีหน้าที่หลักคือดูแลเว็บ PEA Academy
แต่ดูแค่หน้าเว็บเหมือนแอดมิน ช่วยลูกค้าแก้ปัญหาการใช้งาน เก็บ requirement ของฝั่งลูกค้าและฝั่งคนในทีม เพื่อประสานงานปรัปรุงและแก้ไขเว็บกับบริษัท
ลงหลักสูตรทุกหลักสูตรบนเว็บ Pea Academy และส่งรายงานผลการเรียนของพนักงานไฟฟ้าให้ ownwer ออกแบบปกหลักสูตร ใบ certificate
ทำ dashboard สรุปรายได้ของ thai skill ทำเคลียร์เงิน ยืมเงิน สำหรับจัดหลักสูตรอบรม และออกหน้างานไปจัดหลักสูตรต่างจังหวัด
  `,
      title: "งานปัจจุบัน"
    },
    aboutMe: {
      text: `
ชื่อ: ชนิสรา หงษ์เส็ง 
ชื่อเล่น: แพ็ค
รหัสพนักงาน: 9013444
  `,
      title: "About Me"
    }

  }

  function openModal(key) {

    const dataOpen = data[key];

    document.getElementById("modalTitle").innerText = dataOpen.title;

    document.getElementById("modalText").innerText = dataOpen.text;


    document.getElementById("modalBg").style.display = "flex";
  }

  function closeModal() {

    document.getElementById("modalBg").style.display = "none";
  }

</script>

</html>
