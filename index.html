<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <title>Me</title>

  <style>
    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }


    .character {
      position: absolute;
      cursor: pointer;
      transition: 0.2s;
      left: 55%;
      bottom: 3%;
      transform: translateX(-50%);
      width: 35vw;
      max-width: 1000px;
      min-width: 750px;
    }

    .character:hover {
      transform: translateX(-50%) scale(1.08);
    }

    .object {
      position: absolute;
      cursor: pointer;
      transition: 0.2s;
    }

    .object:hover {
      transform: scale(1.08);
    }

    .computer {
      left: 75%;
      top: 20%;
      width: 18vw;
      max-width: 400px;
      min-width: 250px;
    }

    .thaiskill {
      right: 65%;
      top: 5%;
      width: 25vw;
      max-width: 400px;
      min-width: 250px;
    }

    .modal-bg {
      display: none;

      position: fixed;
      inset: 0;

      background: rgba(0, 0, 0, 0.6);

      justify-content: center;
      align-items: center;

      z-index: 999;
    }

    .modal {
      background: white;

      width: 500px;
      max-width: 90vw;

      padding: 30px;

      border-radius: 20px;

      text-align: center;
    }

    .modal button {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>
  <div class="game">
    <img src="background.png" class="background">
    <img src="character.png" class="character" onclick="openModal('aboutMe')">
    <img src="COMPUTER.png" class="object computer" onclick="openModal('devPool')">
    <img src="thaiskill.png" class="object thaiskill" onclick="openModal('thaiSkill')">

  </div>

  <div id="modalBg" class="modal-bg">
    <div class="modal">

      <h2 id="modalTitle"></h2>

      <p id="modalText"></p>

      <button onclick="closeModal()">
        ปิด
      </button>

    </div>
  </div>

</body>

<script>

  const data = {
    devPool: {
      text: `
อยากเข้า DevPool เพราะ น่าสนุกดี ไม่ได้ code นานแล้ว จะได้รื้อฟื้นความรู้เก่าๆและได้เรียนรู้ skill ใหม่ๆด้วย ตอนนี้ยังมีเรื่องที่ไม่รู้เกี่ยวกับ programing อีกเยอะ เป็นโอกาสดีที่ได้เรียนรู้อะไรใหม่ๆเพิ่ม
  `,
      title: "ทำไมถึงอยากเข้า DevPool"

    },
    thaiSkill: {
      text: `
สังกัด: สชก.(บก-ท)
ตำแหน่ง: content delivery
รายละเอียดงาน:อยู่หน่วยธุรกิจ Thaiskill มีหน้าที่หลักคือดูแลเว็บ PEA Academy
แต่ดูแค่หน้าเว็บเหมือนแอดมิน ช่วยลูกค้าแก้ปัญหาการใช้งาน เก็บ requirement ของฝั่งลูกค้าและฝั่งคนในทีม เพื่อประสานงานปรัปรุงและแก้ไขเว็บกับบริษัท
ลงหลักสูตรทุกหลักสูตรบนเว็บ Pea Academy และส่งรายงานผลการเรียนของพนักงานไฟฟ้าให้ ownwer ออกแบบปกหลักสูตร ใบ certificate
ทำ dashboard สรุปรายได้ของ thai skill ทำเคลียร์เงิน ยืมเงิน สำหรับจัดหลักสูตรอบรม และออกหน้างานไปจัดหลักสูตรต่างจังหวัด
  `,
      title: "งานปัจจุบัน"
    },
    aboutMe: {
      text: `
ชื่อ: ชนิสรา หงษ์เส็ง 
ชื่อเล่น: แพ็ค
รหัสพนักงาน: 9013444
  `,
      title: "About Me"
    }

  }

  function openModal(key) {

    const dataOpen = data[key];

    document.getElementById("modalTitle").innerText = dataOpen.title;

    document.getElementById("modalText").innerText = dataOpen.text;


    document.getElementById("modalBg").style.display = "flex";
  }

  function closeModal() {

    document.getElementById("modalBg").style.display = "none";
  }

</script>

</html>
