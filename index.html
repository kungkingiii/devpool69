<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <title>Me</title>

  <style>
    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }


    .character {
      position: absolute;
      cursor: pointer;
      transition: 0.2s;
      left: 55%;
      bottom: 3%;
      transform: translateX(-50%);
      width: 35vw;
      max-width: 1000px;
      min-width: 750px;
    }

    .character:hover {
      transform: translateX(-50%) scale(1.08);
    }

    .object {
      position: absolute;
      cursor: pointer;
      transition: 0.2s;
    }

    .object:hover {
      transform: scale(1.08);
    }

    .computer {
      left: 75%;
      top: 20%;
      width: 18vw;
      max-width: 400px;
      min-width: 250px;
    }

    .thaiskill {
      right: 65%;
      top: 5%;
      width: 25vw;
      max-width: 400px;
      min-width: 250px;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: white;
      width: 320px;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .modal h2 {
      margin-top: 0;
    }

    .modal button {
      margin-top: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .modal button:hover {
      background: #005fcc;
    }
  </style>
</head>

<body>
  <div class="game">
    <img src="background.png" class="background">
    <img src="character.png" class="character">
    <img src="COMPUTER.png" class="object computer"
      onclick="openModal('คอมพิวเตอร์', 'ใช้สำหรับเรียนรู้ข้อมูลหรือทำภารกิจ')">
    <img src="thaiskill.png" class="object thaiskill"
      onclick="openModal('คอมพิวเตอร์', 'ใช้สำหรับเรียนรู้ข้อมูลหรือทำภารกิจ')">

  </div>
  <script>
    function openModal(title, text) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalText").innerText = text;
      document.getElementById("modalBg").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modalBg").style.display = "none";
    }
  </script>
</body>

</html>
